<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <!-- Background -->
  <rect width="1290" height="2796" fill="#FFF8EC"/>

  <!-- Decorative background shapes -->
  <circle cx="120" cy="350" r="55" fill="#E9C46A" opacity="0.4"/>
  <circle cx="1170" cy="280" r="38" fill="#A8C686" opacity="0.4"/>
  <circle cx="1210" cy="900" r="60" fill="#F4A261" opacity="0.25"/>
  <circle cx="80" cy="1100" r="42" fill="#E9C46A" opacity="0.3"/>
  <polygon points="100,550 145,480 190,550 145,620" fill="#E9C46A" opacity="0.35"/>
  <rect x="1140" y="700" width="60" height="60" rx="10" fill="#F6CBA3" opacity="0.5" transform="rotate(20 1170 730)"/>

  <!-- Dynamic Island -->
  <rect x="470" y="18" width="350" height="42" rx="21" fill="#1a1a1a"/>

  <!-- Status bar — time -->
  <text x="72" y="58" font-family="system-ui, sans-serif" font-size="48" font-weight="600" fill="#5B3A29">9:41</text>

  <!-- Status bar — battery -->
  <rect x="1168" y="30" width="70" height="32" rx="8" fill="none" stroke="#5B3A29" stroke-width="3.5"/>
  <rect x="1238" y="39" width="7" height="14" rx="3" fill="#5B3A29"/>
  <rect x="1171" y="33" width="58" height="26" rx="5" fill="#A8C686"/>
  <!-- Signal dots -->
  <circle cx="1100" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1122" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1144" cy="46" r="7" fill="#5B3A29"/>

  <!-- Brain mascot -->
  <g transform="translate(645 490)">
    <ellipse cx="0" cy="0" rx="170" ry="160" fill="#F4A261" opacity="0.15"/>
    <path d="M -82 -52 Q -82 -126, 0 -126 Q 82 -126, 82 -52 Q 118 -38, 118 28 Q 118 94, 82 112 Q 82 162, 36 180 Q 0 188, -36 180 Q -82 162, -82 112 Q -118 94, -118 28 Q -118 -38, -82 -52 Z"
          fill="#FFF8EC" stroke="#5B3A29" stroke-width="5.5"/>
    <circle cx="-30" cy="18" r="14" fill="#5B3A29"/>
    <circle cx="30" cy="18" r="14" fill="#5B3A29"/>
    <!-- Eye shine -->
    <circle cx="-24" cy="12" r="5" fill="#FFF8EC"/>
    <circle cx="36" cy="12" r="5" fill="#FFF8EC"/>
    <!-- Smile -->
    <path d="M -30 68 Q 0 94, 30 68" stroke="#5B3A29" stroke-width="8" stroke-linecap="round" fill="none"/>
    <!-- Accent dots -->
    <circle cx="-105" cy="-68" r="20" fill="#E9C46A"/>
    <circle cx="105" cy="-68" r="20" fill="#A8C686"/>
    <circle cx="0" cy="-132" r="18" fill="#F6CBA3"/>
  </g>

  <!-- App title -->
  <text x="645" y="870" font-family="'Nunito', system-ui, sans-serif" font-size="96" font-weight="800" fill="#5B3A29" text-anchor="middle" letter-spacing="-1">Little Brain Games</text>

  <!-- Tagline -->
  <text x="645" y="960" font-family="system-ui, sans-serif" font-size="50" font-weight="500" fill="#7a5a48" text-anchor="middle">What would you like to play?</text>

  <!-- Memory button -->
  <rect x="95" y="1060" width="1100" height="156" rx="78" fill="#F4A261"/>
  <text x="645" y="1162" font-family="system-ui, sans-serif" font-size="66" font-weight="700" fill="#FFF8EC" text-anchor="middle">🧠  Memory</text>

  <!-- Pattern button -->
  <rect x="95" y="1256" width="1100" height="156" rx="78" fill="#E9C46A"/>
  <text x="645" y="1358" font-family="system-ui, sans-serif" font-size="66" font-weight="700" fill="#5B3A29" text-anchor="middle">🎨  Pattern</text>

  <!-- Puzzle button -->
  <rect x="95" y="1452" width="1100" height="156" rx="78" fill="#A8C686"/>
  <text x="645" y="1554" font-family="system-ui, sans-serif" font-size="66" font-weight="700" fill="#5B3A29" text-anchor="middle">🧩  Jigsaw Puzzle</text>

  <!-- Logic button -->
  <rect x="95" y="1648" width="1100" height="156" rx="78" fill="#F6CBA3"/>
  <text x="645" y="1750" font-family="system-ui, sans-serif" font-size="66" font-weight="700" fill="#5B3A29" text-anchor="middle">🦉  Odd One Out</text>

  <!-- Trust strip -->
  <text x="645" y="2000" font-family="system-ui, sans-serif" font-size="44" font-weight="600" fill="#5B3A29" text-anchor="middle" opacity="0.65">No ads · No tracking · No internet</text>

  <!-- Difficulty label -->
  <text x="645" y="2120" font-family="system-ui, sans-serif" font-size="40" fill="#7a5a48" text-anchor="middle">Easy · Medium · Hard difficulty levels</text>

  <!-- Stars decoration -->
  <text x="645" y="2220" font-family="system-ui, sans-serif" font-size="56" text-anchor="middle">⭐ ⭐ ⭐ ⭐ ⭐</text>

  <!-- iOS Home Indicator -->
  <rect x="455" y="2736" width="380" height="10" rx="5" fill="#5B3A29" opacity="0.18"/>
</svg>
