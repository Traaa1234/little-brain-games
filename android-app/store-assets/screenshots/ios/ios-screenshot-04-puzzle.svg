<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <!-- Background -->
  <rect width="1290" height="2796" fill="#FFF8EC"/>

  <!-- Dynamic Island -->
  <rect x="470" y="18" width="350" height="42" rx="21" fill="#1a1a1a"/>

  <!-- Status bar — time -->
  <text x="72" y="58" font-family="system-ui, sans-serif" font-size="48" font-weight="600" fill="#5B3A29">9:41</text>
  <rect x="1168" y="30" width="70" height="32" rx="8" fill="none" stroke="#5B3A29" stroke-width="3.5"/>
  <rect x="1238" y="39" width="7" height="14" rx="3" fill="#5B3A29"/>
  <rect x="1171" y="33" width="58" height="26" rx="5" fill="#A8C686"/>
  <circle cx="1100" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1122" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1144" cy="46" r="7" fill="#5B3A29"/>

  <!-- Back button -->
  <text x="72" y="168" font-family="system-ui, sans-serif" font-size="52" fill="#A8C686">‹ Back</text>

  <!-- Game header bar -->
  <rect x="0" y="190" width="1290" height="130" fill="#A8C686"/>
  <text x="645" y="278" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#5B3A29" text-anchor="middle">🧩 Jigsaw Puzzle</text>

  <!-- Difficulty pills -->
  <rect x="60" y="360" width="190" height="68" rx="34" fill="#FFF8EC" stroke="#A8C686" stroke-width="3"/>
  <text x="155" y="404" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#A8C686" text-anchor="middle">10</text>
  <rect x="268" y="360" width="190" height="68" rx="34" fill="#FFF8EC" stroke="#A8C686" stroke-width="3"/>
  <text x="363" y="404" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#A8C686" text-anchor="middle">25</text>
  <rect x="476" y="360" width="190" height="68" rx="34" fill="#A8C686"/>
  <text x="571" y="404" font-family="system-ui, sans-serif" font-size="36" font-weight="700" fill="#FFF8EC" text-anchor="middle">50</text>
  <rect x="684" y="360" width="190" height="68" rx="34" fill="#FFF8EC" stroke="#A8C686" stroke-width="3"/>
  <text x="779" y="404" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#A8C686" text-anchor="middle">75</text>
  <rect x="892" y="360" width="190" height="68" rx="34" fill="#FFF8EC" stroke="#A8C686" stroke-width="3"/>
  <text x="987" y="404" font-family="system-ui, sans-serif" font-size="36" font-weight="600" fill="#A8C686" text-anchor="middle">100</text>
  <!-- Upload button -->
  <rect x="1100" y="360" width="160" height="68" rx="34" fill="#F4A261"/>
  <text x="1180" y="404" font-family="system-ui, sans-serif" font-size="32" font-weight="700" fill="#FFF8EC" text-anchor="middle">📷</text>

  <!-- Puzzle board background -->
  <rect x="60" y="460" width="1170" height="1170" rx="20" fill="#F6CBA3" opacity="0.5" stroke="#E9C46A" stroke-width="3"/>

  <!-- Puzzle pieces — simplified jigsaw representation (butterfly scene) -->
  <!-- Assembled pieces (coral/green colors) -->
  <!-- Row 1 of pieces -->
  <rect x="90" y="490" width="222" height="222" rx="4" fill="#A8D4F5" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="318" y="490" width="222" height="222" rx="4" fill="#7BB8E8" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="546" y="490" width="222" height="222" rx="4" fill="#A8D4F5" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="774" y="490" width="222" height="222" rx="4" fill="#6BA3D6" stroke="#FFF8EC" stroke-width="3"/>
  <!-- empty slot -->
  <rect x="1002" y="490" width="222" height="222" rx="4" fill="#F6CBA3" stroke="#E9C46A" stroke-width="3" stroke-dasharray="10,6"/>

  <!-- Row 2 -->
  <rect x="90" y="718" width="222" height="222" rx="4" fill="#87C96B" stroke="#FFF8EC" stroke-width="3"/>
  <!-- Butterfly body -->
  <ellipse cx="429" cy="829" rx="80" ry="50" fill="#F4A261"/>
  <rect x="318" y="718" width="222" height="222" rx="4" fill="#F4A261" stroke="#FFF8EC" stroke-width="3" opacity="0.9"/>
  <rect x="546" y="718" width="222" height="222" rx="4" fill="#E9C46A" stroke="#FFF8EC" stroke-width="3"/>
  <!-- empty slot -->
  <rect x="774" y="718" width="222" height="222" rx="4" fill="#F6CBA3" stroke="#E9C46A" stroke-width="3" stroke-dasharray="10,6"/>
  <rect x="1002" y="718" width="222" height="222" rx="4" fill="#A8D4F5" stroke="#FFF8EC" stroke-width="3"/>

  <!-- Row 3 -->
  <!-- empty slot -->
  <rect x="90" y="946" width="222" height="222" rx="4" fill="#F6CBA3" stroke="#E9C46A" stroke-width="3" stroke-dasharray="10,6"/>
  <rect x="318" y="946" width="222" height="222" rx="4" fill="#87C96B" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="546" y="946" width="222" height="222" rx="4" fill="#6BA3D6" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="774" y="946" width="222" height="222" rx="4" fill="#E9C46A" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="1002" y="946" width="222" height="222" rx="4" fill="#87C96B" stroke="#FFF8EC" stroke-width="3"/>

  <!-- Row 4 -->
  <rect x="90" y="1174" width="222" height="222" rx="4" fill="#7BB8E8" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="318" y="1174" width="222" height="222" rx="4" fill="#A8D4F5" stroke="#FFF8EC" stroke-width="3"/>
  <!-- empty slot -->
  <rect x="546" y="1174" width="222" height="222" rx="4" fill="#F6CBA3" stroke="#E9C46A" stroke-width="3" stroke-dasharray="10,6"/>
  <rect x="774" y="1174" width="222" height="222" rx="4" fill="#F4A261" stroke="#FFF8EC" stroke-width="3"/>
  <rect x="1002" y="1174" width="222" height="222" rx="4" fill="#6BA3D6" stroke="#FFF8EC" stroke-width="3"/>

  <!-- Progress text -->
  <text x="645" y="1710" font-family="system-ui, sans-serif" font-size="46" fill="#7a5a48" text-anchor="middle">17 of 25 pieces placed</text>

  <!-- Progress bar -->
  <rect x="60" y="1740" width="1170" height="26" rx="13" fill="#F6CBA3"/>
  <rect x="60" y="1740" width="796" height="26" rx="13" fill="#A8C686"/>

  <!-- Loose pieces tray -->
  <rect x="60" y="1810" width="1170" height="220" rx="20" fill="#F6CBA3" opacity="0.7" stroke="#E9C46A" stroke-width="2"/>
  <text x="645" y="1870" font-family="system-ui, sans-serif" font-size="38" fill="#7a5a48" text-anchor="middle">Pieces to place:</text>

  <!-- 4 loose pieces -->
  <rect x="120" y="1890" width="160" height="120" rx="10" fill="#E9C46A" stroke="#FFF8EC" stroke-width="3" transform="rotate(-8 200 950)"/>
  <rect x="340" y="1895" width="160" height="120" rx="10" fill="#F4A261" stroke="#FFF8EC" stroke-width="3" transform="rotate(5 420 955)"/>
  <rect x="560" y="1888" width="160" height="120" rx="10" fill="#A8C686" stroke="#FFF8EC" stroke-width="3" transform="rotate(-4 640 948)"/>
  <rect x="780" y="1892" width="160" height="120" rx="10" fill="#7BB8E8" stroke="#FFF8EC" stroke-width="3" transform="rotate(7 860 952)"/>

  <!-- iOS Home Indicator -->
  <rect x="455" y="2736" width="380" height="10" rx="5" fill="#5B3A29" opacity="0.18"/>
</svg>
