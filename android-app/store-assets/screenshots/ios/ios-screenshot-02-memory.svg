<svg xmlns="http://www.w3.org/2000/svg" width="1290" height="2796" viewBox="0 0 1290 2796">
  <!-- Background -->
  <rect width="1290" height="2796" fill="#FFF8EC"/>

  <!-- Dynamic Island -->
  <rect x="470" y="18" width="350" height="42" rx="21" fill="#1a1a1a"/>

  <!-- Status bar — time -->
  <text x="72" y="58" font-family="system-ui, sans-serif" font-size="48" font-weight="600" fill="#5B3A29">9:41</text>
  <rect x="1168" y="30" width="70" height="32" rx="8" fill="none" stroke="#5B3A29" stroke-width="3.5"/>
  <rect x="1238" y="39" width="7" height="14" rx="3" fill="#5B3A29"/>
  <rect x="1171" y="33" width="58" height="26" rx="5" fill="#A8C686"/>
  <circle cx="1100" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1122" cy="46" r="7" fill="#5B3A29"/>
  <circle cx="1144" cy="46" r="7" fill="#5B3A29"/>

  <!-- Back button -->
  <text x="72" y="168" font-family="system-ui, sans-serif" font-size="52" fill="#F4A261">‹ Back</text>

  <!-- Game header bar -->
  <rect x="0" y="190" width="1290" height="130" fill="#F4A261"/>
  <text x="645" y="278" font-family="system-ui, sans-serif" font-size="72" font-weight="800" fill="#FFF8EC" text-anchor="middle">🧠 Memory</text>

  <!-- Difficulty pills -->
  <rect x="154" y="360" width="250" height="74" rx="37" fill="#F4A261"/>
  <text x="279" y="408" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#FFF8EC" text-anchor="middle">Easy</text>
  <rect x="424" y="360" width="250" height="74" rx="37" fill="#FFF8EC" stroke="#F4A261" stroke-width="3"/>
  <text x="549" y="408" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4A261" text-anchor="middle">Medium</text>
  <rect x="694" y="360" width="250" height="74" rx="37" fill="#FFF8EC" stroke="#F4A261" stroke-width="3"/>
  <text x="819" y="408" font-family="system-ui, sans-serif" font-size="42" font-weight="700" fill="#F4A261" text-anchor="middle">Hard</text>

  <!-- Mode toggle -->
  <rect x="245" y="472" width="800" height="74" rx="37" fill="#F6CBA3" opacity="0.6"/>
  <rect x="247" y="474" width="395" height="70" rx="35" fill="#FFF8EC" stroke="#F4A261" stroke-width="2"/>
  <text x="445" y="520" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#F4A261" text-anchor="middle">🖼 Pictures</text>
  <text x="843" y="520" font-family="system-ui, sans-serif" font-size="40" font-weight="700" fill="#7a5a48" text-anchor="middle">📝 Words</text>

  <!-- Score bar -->
  <text x="645" y="620" font-family="system-ui, sans-serif" font-size="46" fill="#7a5a48" text-anchor="middle">Pairs found: 3 of 6</text>

  <!-- Card grid — 3 columns × 4 rows -->
  <!-- Row 1 -->
  <!-- Card 1 — matched (face up, dimmed) -->
  <rect x="60" y="660" width="350" height="300" rx="28" fill="#A8C686" opacity="0.5"/>
  <text x="235" y="840" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle" opacity="0.5">🌟</text>

  <!-- Card 2 — face down -->
  <rect x="470" y="660" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="645" y="840" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Card 3 — matched (face up, dimmed) -->
  <rect x="880" y="660" width="350" height="300" rx="28" fill="#A8C686" opacity="0.5"/>
  <text x="1055" y="840" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle" opacity="0.5">🌟</text>

  <!-- Row 2 -->
  <!-- Card 4 — face up (just flipped) -->
  <rect x="60" y="1000" width="350" height="300" rx="28" fill="#FFF8EC" stroke="#E9C46A" stroke-width="6"/>
  <text x="235" y="1180" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">🦋</text>

  <!-- Card 5 — face down -->
  <rect x="470" y="1000" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="645" y="1180" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Card 6 — face up (just flipped, matches card 4) -->
  <rect x="880" y="1000" width="350" height="300" rx="28" fill="#FFF8EC" stroke="#E9C46A" stroke-width="6"/>
  <text x="1055" y="1180" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">🦋</text>

  <!-- Row 3 -->
  <!-- Card 7 — face down -->
  <rect x="60" y="1340" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="235" y="1520" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Card 8 — matched -->
  <rect x="470" y="1340" width="350" height="300" rx="28" fill="#A8C686" opacity="0.5"/>
  <text x="645" y="1520" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle" opacity="0.5">🌈</text>

  <!-- Card 9 — face down -->
  <rect x="880" y="1340" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="1055" y="1520" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Row 4 -->
  <!-- Card 10 — matched -->
  <rect x="60" y="1680" width="350" height="300" rx="28" fill="#A8C686" opacity="0.5"/>
  <text x="235" y="1860" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle" opacity="0.5">🌈</text>

  <!-- Card 11 — face down -->
  <rect x="470" y="1680" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="645" y="1860" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Card 12 — face down -->
  <rect x="880" y="1680" width="350" height="300" rx="28" fill="#F4A261"/>
  <text x="1055" y="1860" font-family="system-ui, sans-serif" font-size="130" text-anchor="middle">❓</text>

  <!-- Match feedback bubble -->
  <rect x="295" y="2050" width="700" height="110" rx="55" fill="#A8C686"/>
  <text x="645" y="2122" font-family="system-ui, sans-serif" font-size="54" font-weight="700" fill="#FFF8EC" text-anchor="middle">✓ Great match!</text>

  <!-- iOS Home Indicator -->
  <rect x="455" y="2736" width="380" height="10" rx="5" fill="#5B3A29" opacity="0.18"/>
</svg>
