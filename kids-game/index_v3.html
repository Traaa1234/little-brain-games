<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learning Games for Kids</title>
<style>
:root {
  --bg: #FFF8EC;
  --accent: #F4A261;
  --accent-2: #E9C46A;
  --success: #A8C686;
  --tile: #F6CBA3;
  --text: #5B3A29;
  --radius: 16px;
  --shadow: 0 4px 12px rgba(91, 58, 41, 0.12);
}
* { box-sizing: border-box; }
html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: "Nunito", "Baloo 2", "Comic Neue", system-ui, -apple-system, sans-serif;
  font-size: 20px;
  min-height: 100vh;
}
#app {
  max-width: 900px;
  margin: 0 auto;
  padding: 16px;
}
h1 {
  font-size: 32px;
  margin: 8px 0 16px;
  text-align: center;
  color: var(--accent);
}
.toolbar {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}
.toolbar button {
  font: inherit;
  font-size: 18px;
  padding: 12px 18px;
  background: var(--tile);
  color: var(--text);
  border: 3px solid transparent;
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.1s, border-color 0.2s;
  box-shadow: var(--shadow);
}
.toolbar button:hover { transform: translateY(-2px); }
.toolbar button.active {
  background: var(--accent);
  color: white;
  border-color: var(--text);
}
#sub-toolbar {
  min-height: 0;
}
#sub-toolbar:empty { margin-bottom: 0; }
#game-area {
  background: white;
  border-radius: var(--radius);
  padding: 24px;
  min-height: 400px;
  box-shadow: var(--shadow);
}
#status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 16px;
  margin-top: 16px;
  background: var(--accent-2);
  border-radius: var(--radius);
  font-weight: bold;
}
#status-bar button {
  font: inherit;
  padding: 8px 14px;
  border: none;
  border-radius: 12px;
  background: var(--text);
  color: white;
  cursor: pointer;
}
.memory-grid {
  display: grid;
  gap: 12px;
  justify-content: center;
  max-width: 600px;
  margin: 0 auto;
}
.memory-card {
  width: 100px;
  height: 100px;
  background: var(--tile);
  border: 3px solid var(--accent);
  border-radius: var(--radius);
  font-size: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  transition: transform 0.3s, background 0.2s;
}
.memory-card.hidden { color: transparent; }
.memory-card.hidden::after {
  content: '?';
  color: var(--accent-2);
  font-size: 40px;
}
.memory-card.matched {
  background: var(--success);
  border-color: var(--success);
  cursor: default;
}
.memory-card.word {
  font-size: 24px;
  font-weight: bold;
  font-family: "Courier New", monospace;
}
@keyframes sparkle {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.memory-card.sparkle { animation: sparkle 0.5s ease; }
.pattern-sequence {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin: 24px 0;
}
.pattern-slot {
  width: 80px;
  height: 80px;
  background: var(--tile);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: bold;
}
.pattern-slot.blank {
  background: white;
  border: 3px dashed var(--accent);
  color: var(--accent);
  font-size: 32px;
}
.pattern-options {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  justify-content: center;
  margin-top: 24px;
}
.pattern-options button {
  font: inherit;
  font-size: 32px;
  font-weight: bold;
  width: 80px;
  height: 80px;
  background: var(--accent-2);
  border: 3px solid var(--text);
  border-radius: var(--radius);
  cursor: pointer;
  transition: transform 0.1s, background 0.2s;
}
.pattern-options button:hover { transform: translateY(-3px); }
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-8px); }
  75% { transform: translateX(8px); }
}
.pattern-options button.wrong {
  animation: shake 0.3s;
  opacity: 0.5;
}
.pattern-svg { width: 48px; height: 48px; }
.jigsaw-info { text-align: center; margin: 8px 0 12px; color: var(--text); }
.jigsaw-scene-picker {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.jigsaw-scene-picker button {
  font: inherit;
  font-size: 16px;
  padding: 8px 14px;
  background: var(--tile);
  color: var(--text);
  border: 2px solid var(--text);
  border-radius: 12px;
  cursor: pointer;
}
.jigsaw-scene-picker button.active {
  background: var(--accent);
  color: white;
}
.jigsaw-scene-picker button.upload {
  background: var(--success);
  color: white;
  border-color: var(--text);
  font-weight: bold;
}
.jigsaw-container {
  position: relative;
  user-select: none;
  touch-action: none;
}
.jigsaw-board {
  position: relative;
  margin: 0 auto;
  background: white;
  border: 3px dashed var(--accent);
  border-radius: var(--radius);
  overflow: hidden;
}
.jigsaw-board.complete { border-color: var(--success); border-style: solid; }
.jigsaw-board > svg.ghost {
  display: block;
  opacity: 0.18;
  transition: opacity 0.4s;
}
.jigsaw-board.complete > svg.ghost { opacity: 1; }
.jigsaw-tray {
  margin-top: 16px;
  background: var(--tile);
  border-radius: var(--radius);
  position: relative;
}
.jigsaw-piece {
  position: absolute;
  left: 0;
  top: 0;
  cursor: grab;
  filter: drop-shadow(2px 2px 3px rgba(0,0,0,0.25));
  will-change: transform;
}
.jigsaw-piece.dragging {
  cursor: grabbing;
  filter: drop-shadow(4px 6px 8px rgba(0,0,0,0.4));
  z-index: 1000;
}
.jigsaw-piece.placed {
  cursor: default;
  filter: none;
  z-index: 1;
}
.jigsaw-piece svg { display: block; }
.jigsaw-piece svg * { pointer-events: none; }
.logic-grid {
  display: grid;
  grid-template-columns: repeat(2, 140px);
  gap: 20px;
  justify-content: center;
  margin: 24px 0;
}
.logic-tile {
  width: 140px;
  height: 140px;
  background: var(--accent-2);
  border: 3px solid var(--text);
  border-radius: var(--radius);
  font-size: 72px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.1s;
}
.logic-tile:hover { transform: translateY(-3px); }
.logic-tile.wrong { animation: shake 0.3s; opacity: 0.5; }
@keyframes fly-away {
  to { transform: translateY(-200px) scale(0.3); opacity: 0; }
}
.logic-tile.correct { animation: fly-away 0.8s forwards; background: var(--success); }
@media (max-width: 600px) {
  html, body { font-size: 16px; }
  .toolbar button { padding: 8px 12px; font-size: 16px; }
  .memory-card { width: 70px; height: 70px; font-size: 34px; }
  .memory-card.word { font-size: 16px; }
  .pattern-slot, .pattern-options button { width: 60px; height: 60px; font-size: 28px; }
  .jigsaw-scene-picker button { font-size: 14px; padding: 6px 10px; }
  .logic-tile { width: 110px; height: 110px; font-size: 56px; }
}
</style>
</head>

<div id="app">

/* ============================================================
 * AUDIO — Web Audio API, synthesized tones
 * ============================================================ */
const audio = {
  ctx: null,
  muted: false,

  ensureCtx() {
    if (!audio.ctx) {
      try {
        audio.ctx = new (window.AudioContext || window.webkitAudioContext)();
      } catch (e) {
        audio.ctx = null;
      }
    }
  },

  tone(freq, duration, type = 'sine', gain = 0.15) {
    if (audio.muted) return;
    audio.ensureCtx();
    if (!audio.ctx) return;
    const ctx = audio.ctx;
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    g.gain.setValueAtTime(0, ctx.currentTime);
    g.gain.linearRampToValueAtTime(gain, ctx.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(g);
    g.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
  },

  correct() {
    audio.tone(660, 0.15, 'sine');
    setTimeout(() => audio.tone(880, 0.2, 'sine'), 100);
  },

  wrong() {
    audio.tone(220, 0.2, 'triangle', 0.1);
  },

  celebrate() {
    [523, 659, 784, 1047].forEach((f, i) => {
      setTimeout(() => audio.tone(f, 0.2, 'sine'), i * 120);
    });
  },

  toggleMute() {
    audio.muted = !audio.muted;
    return audio.muted;
  },
};

      b.classList.toggle('active', b.dataset.game === state.game);
    });
    document.querySelectorAll('#difficulty-toolbar button').forEach(b => {
      b.classList.toggle('active', b.dataset.difficulty === state.difficulty);
    });
    ui.renderSubToolbar();
  },

  renderSubToolbar() {
    const bar = document.getElementById('sub-toolbar');
    bar.innerHTML = '';
    if (state.game === 'memory') {
      ['picture', 'word'].forEach(m => {
        const b = document.createElement('button');
        b.textContent = m === 'picture' ? '🖼️ Pictures' : '🔤 Words';
        b.classList.toggle('active', state.subMode === m || (state.subMode === null && m === 'picture'));
        b.addEventListener('click', () => setSubMode(m));
        bar.appendChild(b);
      });
    } else if (state.game === 'pattern') {
      [['shapes', '🔺 Shapes'], ['letters', '🔤 Letters+Numbers'], ['words', '📖 Words']].forEach(([m, label]) => {
        const b = document.createElement('button');
        b.textContent = label;
        b.classList.toggle('active', state.subMode === m || (state.subMode === null && m === 'shapes'));
        b.addEventListener('click', () => setSubMode(m));
        bar.appendChild(b);
      });
    }
  },

  renderGame() {
    const area = document.getElementById('game-area');
    if (state.game === 'memory') {
      if (!state.subMode) state.subMode = 'picture';
      games.memory.newGame();
      games.memory.render();
    } else if (state.game === 'pattern') {
      if (!state.subMode) state.subMode = 'shapes';
      games.pattern.streak = 0;
      games.pattern.newRound();
      games.pattern.renderArea();
    } else if (state.game === 'puzzle') {
      games.puzzle.newPuzzle();
      games.puzzle.render();
      // Scatter after the DOM has laid out so we can read tray dimensions.
      requestAnimationFrame(() => games.puzzle.scatter());
    } else if (state.game === 'logic') {
      games.logic.solved = 0;
      games.logic.newRound();
      games.logic.render();
    } else {
      area.innerHTML = `<p>Coming soon…</p>`;
    }
  },

  renderStatus() {
    document.getElementById('score-display').textContent = `⭐ ${state.score}`;
  },
};

/* ============================================================
 * GAMES
 * ============================================================ */
const games = {};

/* -------- Memory -------- */
games.memory = {
  cards: [],
  firstPick: null,
  locked: false,

  gridSize() {
    return { easy: 6, medium: 12, hard: 20 }[state.difficulty];
  },

  gridColumns() {
    return { easy: 3, medium: 4, hard: 5 }[state.difficulty];
  },

  newGame() {
    if (!state.subMode) state.subMode = 'picture';
    const size = games.memory.gridSize();
    const pairCount = size / 2;
    const pool = CONTENT.emoji.slice();
    // Shuffle pool, take pairCount
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    const chosen = pool.slice(0, pairCount);

    const cards = [];
    if (state.subMode === 'picture') {
      chosen.forEach((e, i) => {
        cards.push({ id: 2 * i,     value: e, display: e, type: 'picture' });
        cards.push({ id: 2 * i + 1, value: e, display: e, type: 'picture' });
      });
    } else {
      // word mode — uses words list, pairs (word card) ↔ (picture card with same value)
      const words = CONTENT.words[state.difficulty].slice(0, pairCount);
      words.forEach((w, i) => {
        cards.push({ id: 2 * i,     value: w, display: CONTENT.wordToEmoji[w] || '?', type: 'picture' });
        cards.push({ id: 2 * i + 1, value: w, display: w, type: 'word' });
      });
    }
    // Shuffle
    for (let i = cards.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [cards[i], cards[j]] = [cards[j], cards[i]];
    }
    cards.forEach(c => { c.flipped = false; c.matched = false; });
    games.memory.cards = cards;
    games.memory.firstPick = null;
    games.memory.locked = false;
  },

  render() {
    const area = document.getElementById('game-area');
    const cols = games.memory.gridColumns();
    const html = `
      <div class="memory-grid" style="grid-template-columns: repeat(${cols}, 100px);">
        ${games.memory.cards.map(c => `
          <div class="memory-card ${c.matched ? 'matched' : c.flipped ? '' : 'hidden'} ${c.type === 'word' ? 'word' : ''}"
               data-id="${c.id}">${c.display}</div>
        `).join('')}
      </div>
    `;
    area.innerHTML = html;
    area.querySelectorAll('.memory-card').forEach(el => {
      el.addEventListener('click', () => games.memory.onClick(parseInt(el.dataset.id, 10)));
    });
  },

  onClick(id) {
    if (games.memory.locked) return;
    const card = games.memory.cards.find(c => c.id === id);
    if (!card || card.matched || card.flipped) return;
    card.flipped = true;
    games.memory.render();

    if (!games.memory.firstPick) {
      games.memory.firstPick = card;
      return;
    }

    const first = games.memory.firstPick;
    if (first.value === card.value) {
      first.matched = true;
      card.matched = true;
      games.memory.firstPick = null;
      addScore(1);
      audio.correct();
      games.memory.render();
      if (games.memory.cards.every(c => c.matched)) {
        audio.celebrate();
        setTimeout(() => alert('🌟 You matched them all! 🌟'), 200);
      }
    } else {
      audio.wrong();
      games.memory.locked = true;
      setTimeout(() => {
        first.flipped = false;
        card.flipped = false;
        games.memory.firstPick = null;
        games.memory.locked = false;
        games.memory.render();
      }, 800);
    }
  },
};

/* -------- Pattern -------- */
games.pattern = {
  sequence: [],
  correct: null,
  options: [],
  streak: 0,

  shapeSvg(name) {
    const color = 'var(--accent)';
    const stroke = `stroke="var(--text)" stroke-width="3" fill="${color}"`;
    const svgs = {
      dot:      `<circle cx="20" cy="20" r="6" ${stroke}/>`,
      circle:   `<circle cx="20" cy="20" r="16" ${stroke}/>`,
      square:   `<rect x="4" y="4" width="32" height="32" ${stroke}/>`,
      triangle: `<polygon points="20,4 36,34 4,34" ${stroke}/>`,
      star:     `<polygon points="20,3 25,15 38,15 27,23 32,36 20,28 8,36 13,23 2,15 15,15" ${stroke}/>`,
      hexagon:  `<polygon points="20,4 34,12 34,28 20,36 6,28 6,12" ${stroke}/>`,
      diamond:  `<polygon points="20,4 36,20 20,36 4,20" ${stroke}/>`,
    };
    return `<svg class="pattern-svg" viewBox="0 0 40 40">${svgs[name] || svgs.dot}</svg>`;
  },

  pickPool() {
    if (state.subMode === 'letters') {
      // At difficulty easy/medium: just letters. Hard: mix letters and numbers
      let items;
      if (state.difficulty === 'hard') {
        items = ['A','B','C','D','E','F','1','2','3','4','5','6'];
      } else {
        items = ['A','B','C','D','E','F','G','H','I','J'];
      }
      return { items, render: (x) => `<span style="font-size:40px;">${x}</span>` };
    }
    if (state.subMode === 'words') {
      const items = CONTENT.words[state.difficulty].slice(0, 6);
      return { items, render: (x) => `<span style="font-size:20px; font-weight:bold;">${x}</span>` };
    }
    // default: shapes
    state.subMode = state.subMode || 'shapes';
    return { items: CONTENT.shapes, render: games.pattern.shapeSvg };
  },

  newRound() {
    const pool = games.pattern.pickPool();
    const items = pool.items;
    const unitSize = { easy: 2, medium: 3, hard: 4 }[state.difficulty];
    const visibleLength = { easy: 4, medium: 6, hard: 8 }[state.difficulty];

    const shuffled = items.slice().sort(() => Math.random() - 0.5);
    const unit = shuffled.slice(0, unitSize);

    const full = [];
    for (let i = 0; i < visibleLength + 1; i++) full.push(unit[i % unitSize]);
    const sequence = full.slice(0, visibleLength);
    const correct = full[visibleLength];

    let distractors = shuffled.slice(unitSize).filter(x => x !== correct);
    // Pad from the unit (excluding correct) if pool too small
    if (distractors.length < 3) {
      const padFromUnit = unit.filter(x => x !== correct);
      distractors = distractors.concat(padFromUnit);
    }
    const options = [correct, ...distractors.slice(0, 3)].sort(() => Math.random() - 0.5);

    games.pattern.sequence = sequence;
    games.pattern.correct = correct;
    games.pattern.options = options;
    games.pattern.render = pool.render;
  },

  renderArea() {
    const area = document.getElementById('game-area');
    const r = games.pattern.render;
    area.innerHTML = `
      <div class="pattern-sequence">
        ${games.pattern.sequence.map(x => `<div class="pattern-slot">${r(x)}</div>`).join('')}
        <div class="pattern-slot blank">?</div>
      </div>
      <div class="pattern-options">
        ${games.pattern.options.map(x => `<button data-val="${x}">${r(x)}</button>`).join('')}
      </div>
      <p style="text-align:center; color: var(--text);">Streak: ${games.pattern.streak} / 5</p>
    `;
    area.querySelectorAll('.pattern-options button').forEach(b => {
      b.addEventListener('click', () => games.pattern.onPick(b.dataset.val, b));
    });
  },

  onPick(val, btn) {
    if (val === games.pattern.correct) {
      audio.correct();
      addScore(1);
      games.pattern.streak++;
      if (games.pattern.streak >= 5) {
        games.pattern.streak = 0;
        audio.celebrate();
        setTimeout(() => alert('🌟 Pattern master! 🌟'), 100);
      }
      games.pattern.newRound();
      games.pattern.renderArea();
    } else {
      audio.wrong();
      btn.classList.add('wrong');
      setTimeout(() => btn.classList.remove('wrong'), 400);
    }
  },
};

/* -------- Puzzle (Jigsaw) -------- */
games.puzzle = {
  scene: null,
  sceneIdx: 0,
  rows: 0,
  cols: 0,
  pieceWidth: 0,
  pieceHeight: 0,
  knobDepth: 0,
  boardWidth: 0,
  boardHeight: 0,
  pieces: [],
  drag: null,
  customScenes: [],

  // [cols, rows] per difficulty — 50, 75, 100 pieces
  gridFor() {
    return { easy: [10, 5], medium: [15, 5], hard: [10, 10] }[state.difficulty];
  },

  pieceCount() {
    const [c, r] = games.puzzle.gridFor();
    return c * r;
  },

  // Combined list of built-in + user-uploaded scenes
  allScenes() {
    return CONTENT.puzzleScenes.concat(games.puzzle.customScenes);
  },

  // Render scene background as inner SVG content for the given board dimensions.
  // Handles both 'svg' (inline shapes) and 'image' (raster from file upload) types.
  sceneInnerSvg(scene, boardW, boardH) {
    if (scene.type === 'image') {
      return `<image href="${scene.imageUrl}" x="0" y="0" width="${boardW}" height="${boardH}" preserveAspectRatio="none"/>`;
    }
    // SVG scenes use 600x400 viewBox internally; scale to board.
    return `<g transform="scale(${boardW / 600} ${boardH / 400})">${scene.svg}</g>`;
  },

  // Render scene inside a piece's SVG, translated and scaled so the piece's
  // correct region (correctX, correctY → +pw, +ph in board coords) lands at
  // (margin, margin) in the piece's local SVG coordinate space.
  sceneInPiece(scene, tx, ty, boardW, boardH) {
    if (scene.type === 'image') {
      return `<image href="${scene.imageUrl}" x="${tx}" y="${ty}" width="${boardW}" height="${boardH}" preserveAspectRatio="none"/>`;
    }
    const sx = boardW / 600, sy = boardH / 400;
    return `<g transform="translate(${tx} ${ty}) scale(${sx} ${sy})">${scene.svg}</g>`;
  },

  // Read an uploaded image file, downscale if huge, return scene object.
  loadImageFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          const MAX_W = 1500;
          let w = img.naturalWidth, h = img.naturalHeight;
          let imageUrl = reader.result;
          if (w > MAX_W) {
            const canvas = document.createElement('canvas');
            canvas.width = MAX_W;
            canvas.height = Math.round(h * MAX_W / w);
            canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
            imageUrl = canvas.toDataURL('image/jpeg', 0.85);
            w = canvas.width; h = canvas.height;
          }
          const labelName = file.name.length > 22 ? file.name.slice(0, 19) + '…' : file.name;
          resolve({
            type: 'image',
            label: '📷 ' + labelName,
            imageUrl,
            aspectRatio: h / w,
          });
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  },

  // Pick scene via file picker, add to customScenes, switch puzzle to it.
  uploadScene() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.addEventListener('change', async () => {
      const file = input.files && input.files[0];
      if (!file) return;
      try {
        const scene = await games.puzzle.loadImageFile(file);
        games.puzzle.customScenes.push(scene);
        const newIdx = games.puzzle.allScenes().length - 1;
        games.puzzle.newPuzzle(newIdx);
        games.puzzle.render();
        requestAnimationFrame(() => games.puzzle.scatter());
      } catch (e) {
        alert('Sorry, that image could not be loaded. Try a JPG or PNG.');
      }
    });
    input.click();
  },

  newPuzzle(sceneIdx) {
    if (typeof sceneIdx !== 'number') sceneIdx = games.puzzle.sceneIdx || 0;
    const [cols, rows] = games.puzzle.gridFor();
    const scenes = games.puzzle.allScenes();
    const scene = scenes[sceneIdx % scenes.length];

    // Board sized to fit game-area; aspect comes from the scene
    // (built-in SVG scenes are 600x400 = 1.5:1; uploaded images use their natural aspect).
    const sceneAspect = scene.type === 'image' ? scene.aspectRatio : (400 / 600);
    const containerW = Math.min(720, (document.getElementById('game-area') || {}).clientWidth || 720);
    const boardW = Math.min(700, containerW - 24);
    const boardH = boardW * sceneAspect;

    const pw = boardW / cols;
    const ph = boardH / rows;
    const knob = Math.min(pw, ph) * 0.18;

    // Generate cut edges. hEdges[r][c] = cut between piece(r,c) and piece(r+1,c).
    // vEdges[r][c] = cut between piece(r,c) and piece(r,c+1). Value: 1 (tab) or -1 (blank).
    const hEdges = [];
    for (let r = 0; r < rows - 1; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) row.push(Math.random() < 0.5 ? 1 : -1);
      hEdges.push(row);
    }
    const vEdges = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols - 1; c++) row.push(Math.random() < 0.5 ? 1 : -1);
      vEdges.push(row);
    }

    const pieces = [];
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const edges = {
          top:    r === 0          ? 0 : -hEdges[r - 1][c],
          right:  c === cols - 1   ? 0 :  vEdges[r][c],
          bottom: r === rows - 1   ? 0 :  hEdges[r][c],
          left:   c === 0          ? 0 : -vEdges[r][c - 1],
        };
        pieces.push({
          id: r * cols + c,
          row: r, col: c,
          correctX: c * pw,
          correctY: r * ph,
          x: 0, y: 0,
          placed: false,
          edges,
          pathD: games.puzzle.buildPath(c, r, pw, ph, knob, edges),
          element: null,
        });
      }
    }

    games.puzzle.scene = scene;
    games.puzzle.sceneIdx = sceneIdx;
    games.puzzle.rows = rows;
    games.puzzle.cols = cols;
    games.puzzle.pieceWidth = pw;
    games.puzzle.pieceHeight = ph;
    games.puzzle.knobDepth = knob;
    games.puzzle.boardWidth = boardW;
    games.puzzle.boardHeight = boardH;
    games.puzzle.pieces = pieces;
  },

  // Build SVG path data for a piece, in board coordinates (0..boardW, 0..boardH).
  buildPath(col, row, w, h, k, edges) {
    const x0 = col * w, y0 = row * h, x1 = x0 + w, y1 = y0 + h;
    let d = `M ${x0} ${y0} `;
    d += games.puzzle.edge(x0, y0, x1, y0, edges.top,    k);
    d += games.puzzle.edge(x1, y0, x1, y1, edges.right,  k);
    d += games.puzzle.edge(x1, y1, x0, y1, edges.bottom, k);
    d += games.puzzle.edge(x0, y1, x0, y0, edges.left,   k);
    return d + 'Z';
  },

  // One edge from (x1,y1) to (x2,y2). type: 0 flat, 1 tab outward, -1 blank inward.
  // Outward = right of direction (clockwise traversal).
  edge(x1, y1, x2, y2, type, k) {
    if (type === 0) return `L ${x2} ${y2} `;
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.hypot(dx, dy);
    const ax = dx / len, ay = dy / len;
    const px = ay, py = -ax;
    const sign = type;
    const t1x = x1 + dx * 0.4, t1y = y1 + dy * 0.4;
    const t2x = x1 + dx * 0.6, t2y = y1 + dy * 0.6;
    const c1x = t1x + px * sign * k * 1.4;
    const c1y = t1y + py * sign * k * 1.4;
    const c2x = t2x + px * sign * k * 1.4;
    const c2y = t2y + py * sign * k * 1.4;
    return `L ${t1x.toFixed(2)} ${t1y.toFixed(2)} ` +
           `C ${c1x.toFixed(2)} ${c1y.toFixed(2)},${c2x.toFixed(2)} ${c2y.toFixed(2)},${t2x.toFixed(2)} ${t2y.toFixed(2)} ` +
           `L ${x2} ${y2} `;
  },

  render() {
    const area = document.getElementById('game-area');
    const { boardWidth, boardHeight, scene, pieces } = games.puzzle;
    const placedCount = pieces.filter(p => p.placed).length;
    const ghostInner = games.puzzle.sceneInnerSvg(scene, boardWidth, boardHeight);
    area.innerHTML = `
      <div class="jigsaw-scene-picker" id="jigsaw-picker"></div>
      <div class="jigsaw-info">
        Drag the pieces onto the board · <span id="jigsaw-counter">${placedCount}</span> / ${pieces.length} placed
      </div>
      <div class="jigsaw-container" id="jigsaw-container">
        <div class="jigsaw-board" id="jigsaw-board" style="width:${boardWidth}px; height:${boardHeight}px;">
          <svg class="ghost" width="${boardWidth}" height="${boardHeight}" viewBox="0 0 ${boardWidth} ${boardHeight}" preserveAspectRatio="none">${ghostInner}</svg>
        </div>
        <div class="jigsaw-tray" id="jigsaw-tray" style="height:${Math.max(220, Math.ceil(pieces.length / 12) * 70)}px;"></div>
      </div>
    `;
    // Scene picker — built-in scenes + any uploaded ones + Upload button
    const picker = document.getElementById('jigsaw-picker');
    games.puzzle.allScenes().forEach((s, i) => {
      const b = document.createElement('button');
      b.textContent = s.label;
      b.classList.toggle('active', i === games.puzzle.sceneIdx);
      b.addEventListener('click', () => {
        games.puzzle.newPuzzle(i);
        games.puzzle.render();
        requestAnimationFrame(() => games.puzzle.scatter());
      });
      picker.appendChild(b);
    });
    const uploadBtn = document.createElement('button');
    uploadBtn.textContent = '📷 Upload picture';
    uploadBtn.className = 'upload';
    uploadBtn.addEventListener('click', () => games.puzzle.uploadScene());
    picker.appendChild(uploadBtn);

    games.puzzle.attachPieces();
  },

  attachPieces() {
    const container = document.getElementById('jigsaw-container');
    games.puzzle.pieces.forEach(piece => {
      const el = games.puzzle.makePieceElement(piece);
      piece.element = el;
      container.appendChild(el);
      el.style.transform = `translate(${piece.x}px,${piece.y}px)`;
      if (piece.placed) el.classList.add('placed');
    });
  },

  makePieceElement(piece) {
    const { pieceWidth: pw, pieceHeight: ph, knobDepth: k, boardWidth, boardHeight, scene } = games.puzzle;
    const margin = k + 4;
    const sw = pw + margin * 2;
    const sh = ph + margin * 2;
    // Translate so the piece's top-left (correctX, correctY) lands at (margin, margin) in piece SVG.
    const tx = -piece.correctX + margin;
    const ty = -piece.correctY + margin;
    const clipId = `clip-${piece.id}`;
    const sceneInner = games.puzzle.sceneInPiece(scene, tx, ty, boardWidth, boardHeight);

    const el = document.createElement('div');
    el.className = 'jigsaw-piece';
    el.dataset.id = piece.id;
    el.style.width = sw + 'px';
    el.style.height = sh + 'px';
    el.innerHTML = `
      <svg width="${sw}" height="${sh}" viewBox="0 0 ${sw} ${sh}">
        <defs>
          <clipPath id="${clipId}">
            <path d="${piece.pathD}" transform="translate(${tx} ${ty})"/>
          </clipPath>
        </defs>
        <g clip-path="url(#${clipId})">${sceneInner}</g>
        <path d="${piece.pathD}" transform="translate(${tx} ${ty})" fill="none" stroke="#5B3A29" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    `;
    el.addEventListener('pointerdown', (e) => games.puzzle.onPointerDown(e, piece));
    return el;
  },

  scatter() {
    const tray = document.getElementById('jigsaw-tray');
    if (!tray) return;
    const trayLeft = tray.offsetLeft;
    const trayTop = tray.offsetTop;
    const trayW = tray.offsetWidth;
    const trayH = tray.offsetHeight;
    const margin = games.puzzle.knobDepth + 4;
    const cellW = games.puzzle.pieceWidth + margin * 2;
    const cellH = games.puzzle.pieceHeight + margin * 2;
    games.puzzle.pieces.forEach(piece => {
      piece.placed = false;
      piece.x = trayLeft + Math.random() * Math.max(8, trayW - cellW);
      piece.y = trayTop + Math.random() * Math.max(8, trayH - cellH);
      if (piece.element) {
        piece.element.classList.remove('placed');
        piece.element.style.transform = `translate(${piece.x}px,${piece.y}px)`;
      }
    });
  },

  onPointerDown(e, piece) {
    if (piece.placed) return;
    e.preventDefault();
    const el = piece.element;
    el.setPointerCapture(e.pointerId);
    el.classList.add('dragging');
    const container = document.getElementById('jigsaw-container');
    const cRect = container.getBoundingClientRect();
    games.puzzle.drag = {
      piece,
      pointerId: e.pointerId,
      offsetX: e.clientX - cRect.left - piece.x,
      offsetY: e.clientY - cRect.top - piece.y,
    };
    el.addEventListener('pointermove', games.puzzle.onPointerMove);
    el.addEventListener('pointerup', games.puzzle.onPointerUp);
    el.addEventListener('pointercancel', games.puzzle.onPointerUp);
  },

  onPointerMove(e) {
    const drag = games.puzzle.drag;
    if (!drag || e.pointerId !== drag.pointerId) return;
    const container = document.getElementById('jigsaw-container');
    const cRect = container.getBoundingClientRect();
    drag.piece.x = e.clientX - cRect.left - drag.offsetX;
    drag.piece.y = e.clientY - cRect.top - drag.offsetY;
    drag.piece.element.style.transform = `translate(${drag.piece.x}px,${drag.piece.y}px)`;
  },

  onPointerUp(e) {
    const drag = games.puzzle.drag;
    if (!drag || e.pointerId !== drag.pointerId) return;
    const piece = drag.piece;
    const el = piece.element;
    el.classList.remove('dragging');
    el.removeEventListener('pointermove', games.puzzle.onPointerMove);
    el.removeEventListener('pointerup', games.puzzle.onPointerUp);
    el.removeEventListener('pointercancel', games.puzzle.onPointerUp);
    games.puzzle.drag = null;

    // Compute target position (where piece element should sit when placed correctly)
    const board = document.getElementById('jigsaw-board');
    const margin = games.puzzle.knobDepth + 4;
    const targetX = board.offsetLeft + piece.correctX - margin;
    const targetY = board.offsetTop + piece.correctY - margin;

    // Snap threshold scales with piece size — larger pieces, larger snap zone
    const snap = Math.max(20, Math.min(games.puzzle.pieceWidth, games.puzzle.pieceHeight) * 0.35);
    if (Math.hypot(piece.x - targetX, piece.y - targetY) < snap) {
      piece.x = targetX;
      piece.y = targetY;
      piece.placed = true;
      el.classList.add('placed');
      el.style.transform = `translate(${piece.x}px,${piece.y}px)`;
      addScore(1);
      audio.correct();
      const counter = document.getElementById('jigsaw-counter');
      if (counter) counter.textContent = games.puzzle.pieces.filter(p => p.placed).length;
      if (games.puzzle.pieces.every(p => p.placed)) {
        board.classList.add('complete');
        audio.celebrate();
        setTimeout(() => alert('🌟 Puzzle complete! 🌟'), 700);
      }
    }
  },
};

/* -------- Logic (Odd One Out) -------- */
games.logic = {
  group: null,
  locked: false,
  solved: 0,

  newRound() {
    const pool = CONTENT.oddGroups[state.difficulty];
    const g = pool[Math.floor(Math.random() * pool.length)];
    const withIdx = g.items.map((item, i) => ({ item, isOdd: i === g.oddIndex }));
    withIdx.sort(() => Math.random() - 0.5);
    games.logic.group = {
      items: withIdx.map(x => x.item),
      oddIndex: withIdx.findIndex(x => x.isOdd),
      hint: g.hint,
    };
    games.logic.locked = false;
  },

  render() {
    const area = document.getElementById('game-area');
    area.innerHTML = `
      <div class="logic-grid">
        ${games.logic.group.items.map((it, i) => `
          <div class="logic-tile" data-idx="${i}">${it}</div>
        `).join('')}
      </div>
      <p style="text-align:center; color: var(--text);">
        Find the one that's different! · Solved: ${games.logic.solved} / 5
      </p>
    `;
    area.querySelectorAll('.logic-tile').forEach(el => {
      el.addEventListener('click', () => games.logic.onPick(parseInt(el.dataset.idx, 10), el));
    });
  },

  onPick(idx, el) {
    if (games.logic.locked) return;
    if (idx === games.logic.group.oddIndex) {
      games.logic.locked = true;
      el.classList.add('correct');
      addScore(1);
      audio.correct();
      games.logic.solved++;
      setTimeout(() => {
        if (games.logic.solved >= 5) {
          games.logic.solved = 0;
          audio.celebrate();
          alert('🌟 Great thinking! 🌟');
        }
        games.logic.newRound();
        games.logic.render();
      }, 900);
    } else {
      audio.wrong();
      el.classList.add('wrong');
      setTimeout(() => el.classList.remove('wrong'), 400);
    }
  },
};

/* ============================================================
 * SELFTEST
 * ============================================================ */
window.__runSelfTest = function() {
  const results = [];
  function assert(name, cond) {
    results.push({ name, pass: !!cond });
    console.log(`[selftest] ${cond ? 'PASS' : 'FAIL'}: ${name}`);
  }

  // Save state to restore
  const saved = { game: state.game, difficulty: state.difficulty, subMode: state.subMode };

  // CONTENT
  assert('CONTENT.emoji non-empty', CONTENT.emoji.length >= 10);
  assert('CONTENT.words all difficulties filled', ['easy','medium','hard'].every(d => CONTENT.words[d].length >= 4));
  assert('CONTENT.shapes non-empty', CONTENT.shapes.length >= 5);
  assert('CONTENT.puzzleScenes non-empty', CONTENT.puzzleScenes.length >= 3);
  assert('CONTENT.oddGroups all difficulties filled', ['easy','medium','hard'].every(d => CONTENT.oddGroups[d].length >= 3));

  // AUDIO
  assert('audio module exists', typeof audio === 'object' && typeof audio.correct === 'function');

  // MEMORY — all modes and difficulties
  ['easy','medium','hard'].forEach(d => {
    ['picture','word'].forEach(m => {
      state.game = 'memory'; state.difficulty = d; state.subMode = m;
      games.memory.newGame();
      const expected = { easy: 6, medium: 12, hard: 20 }[d];
      assert(`memory ${m} ${d}: ${expected} cards`, games.memory.cards.length === expected);
    });
  });

  // PATTERN — all sub-modes and difficulties
  ['easy','medium','hard'].forEach(d => {
    ['shapes','letters','words'].forEach(m => {
      state.game = 'pattern'; state.difficulty = d; state.subMode = m;
      games.pattern.newRound();
      assert(`pattern ${m} ${d}: sequence length > 0`, games.pattern.sequence.length > 0);
      assert(`pattern ${m} ${d}: correct in options`, games.pattern.options.includes(games.pattern.correct));
    });
  });

  // PUZZLE — all difficulties (jigsaw piece counts: 50/75/100)
  ['easy','medium','hard'].forEach(d => {
    state.game = 'puzzle'; state.difficulty = d;
    games.puzzle.newPuzzle(0);
    const expected = { easy: 50, medium: 75, hard: 100 }[d];
    assert(`puzzle ${d}: ${expected} pieces`, games.puzzle.pieces.length === expected);
    assert(`puzzle ${d}: every piece has path`, games.puzzle.pieces.every(p => p.pathD && p.pathD.length > 10));
    assert(`puzzle ${d}: pieces have valid edges`, games.puzzle.pieces.every(p =>
      [p.edges.top, p.edges.right, p.edges.bottom, p.edges.left].every(e => e === 0 || e === 1 || e === -1)));
  });
  assert('CONTENT.puzzleScenes has 7 scenes', CONTENT.puzzleScenes.length === 7);
  assert('CONTENT.oddGroups easy has 50+ groups', CONTENT.oddGroups.easy.length >= 50);
  assert('CONTENT.oddGroups medium has 50+ groups', CONTENT.oddGroups.medium.length >= 50);
  assert('CONTENT.oddGroups hard has 50+ groups', CONTENT.oddGroups.hard.length >= 50);

  // LOGIC — all difficulties
  ['easy','medium','hard'].forEach(d => {
    state.game = 'logic'; state.difficulty = d;
    games.logic.newRound();
    assert(`logic ${d}: 4 items`, games.logic.group.items.length === 4);
    assert(`logic ${d}: oddIndex valid`, games.logic.group.oddIndex >= 0 && games.logic.group.oddIndex < 4);
  });

  // Restore state
  state.game = saved.game; state.difficulty = saved.difficulty; state.subMode = saved.subMode;

  const passed = results.filter(r => r.pass).length;
  console.log(`[selftest] ${passed}/${results.length} passed`);
  return passed === results.length;
};
